<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GPS Tracker">
<link rel="apple-touch-icon" href="icon-192.png">
<title>GPS Tracker — Nikhil</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="header-title">GPS Tracker</div>
    <div class="header-right">
      <div class="sync-dot" id="syncDot" title="Calendar status"></div>
      <div class="header-date" id="hDate"></div>
      <button class="btn-connect" id="btnConnect" onclick="connectCalendar()" style="display:none">Connect</button>
      <button class="btn-disconnect" id="btnDisconnect" onclick="disconnectCalendar()" style="display:none">Disconnect</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab" data-day="goals">GOALS</button>
    <button class="tab" data-day="habits">HABITS</button>
    <button class="tab" data-day="habitdash">DASH ✦</button>
    <button class="tab" data-day="tasks">TASKS</button>
    <button class="tab" data-day="calories">CALORIES</button>
    <button class="tab stats-tab" data-day="history">HISTORY ▸</button>
  </div>
</div>
<div class="main" id="main"></div>
<div class="tooltip" id="tt"></div>

<script src="app.js" defer></script>
</body>
</html>
